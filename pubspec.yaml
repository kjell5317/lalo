name: lalo
version: 0.0.13+31
publish_to: none
description: Leave a Light on
environment:
  sdk: ^3.8.0
dependencies:
  app_links: ^6.4.0
  cloud_firestore: ^6.5.0
  cloud_functions: ^6.3.2
  cupertino_icons: ^1.0.8
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  firebase_ui_auth: ^3.0.1
  firebase_ui_oauth_google: ^2.0.1
  google_sign_in: ^6.3.0
  firebase_crashlytics: ^5.2.3
  firebase_analytics: ^12.4.2
  google_mobile_ads: ^9.0.0
  google_fonts: ^8.1.0
  url_launcher: ^6.3.1
  share_plus: ^13.2.1
  package_info_plus: ^10.2.1
  flutter_colorpicker: ^1.1.0
  fluttertoast: ^9.0.0
  flutter:
    sdk: flutter
dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
flutter:
  uses-material-design: true
  fonts:
    - family: SocialIcons
      fonts:
        - asset: packages/firebase_ui_auth/fonts/SocialIcons.ttf
flutter_launcher_icons:
  image_path: assets/icon/icon.png
  android: true
