<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datenschutz — Leave a Light on</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <style>
    :root {
      --bg: #0e0f13;
      --text: #f4f4f6;
      --muted: #9aa0ae;
      --accent: #ffa726;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      margin: 0;
    }
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px clamp(20px, 6vw, 72px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    header img { width: 34px; height: 34px; border-radius: 9px; }
    header a { color: var(--text); font-weight: 700; text-decoration: none; }
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px clamp(20px, 5vw, 40px) 80px;
    }
    main a { color: var(--accent); }
    h1, h2, h3 { line-height: 1.3; }
    h2 { margin-top: 2.2em; }
    table { border-collapse: collapse; width: 100%; overflow-x: auto; display: block; }
    th, td { border: 1px solid rgba(255, 255, 255, 0.15); padding: 8px 10px; text-align: left; }
    img { max-width: 100%; }
    code { background: rgba(255, 255, 255, 0.08); padding: 2px 5px; border-radius: 4px; }
    #loading { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <img src="icon.png" alt="Leave a Light on logo" />
    <a href="index.html">Leave a Light on</a>
  </header>
  <main>
    <div id="content"><p id="loading">Datenschutzerklärung wird geladen …</p></div>
    <noscript>
      <p>Bitte aktivieren Sie JavaScript oder lesen Sie die
        <a href="datenschutz.md">Datenschutzerklärung als Markdown</a>.</p>
    </noscript>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    fetch("datenschutz.md")
      .then((r) => r.text())
      .then((md) => {
        // Strip the Jekyll front matter block if present.
        md = md.replace(/^---[\s\S]*?---\s*/, "");
        document.getElementById("content").innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById("loading").textContent =
          "Die Datenschutzerklärung konnte nicht geladen werden.";
      });
  </script>
</body>
</html>
