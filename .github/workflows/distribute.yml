name: Distribute App

on:
  push:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install firebase-tools
        run: npm install -g firebase-tools
      - uses: flutter-actions/setup-flutter@v4
      - name: accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null
      - name: install dependencies
        run: |
          flutter pub global activate cider
          flutter pub get
      - name: write Firebase service account key
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/gcp-key.json"
      - name: write Android signing config
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          printf '%s' "$ANDROID_KEY_PROPERTIES" > android/key.properties
      - name: distribute to firebase
        run: bundle exec fastlane distribute
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
